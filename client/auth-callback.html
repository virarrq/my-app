<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmation - Task Planner</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .callback-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
      background: var(--bg);
    }
    
    .callback-card {
      background: var(--card);
      border-radius: 0.5rem;
      padding: 3rem 2rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    
    .callback-card h1 {
      color: var(--primary);
      margin-bottom: 1rem;
      font-size: 1.5rem;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 2rem auto;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .success-icon {
      width: 60px;
      height: 60px;
      margin: 1rem auto;
      display: none;
    }
    
    .success-icon.show {
      display: block;
    }
    
    .error-icon {
      width: 60px;
      height: 60px;
      margin: 1rem auto;
      display: none;
      color: var(--danger);
    }
    
    .error-icon.show {
      display: block;
    }
    
    .message {
      color: var(--text-light);
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="callback-container">
    <div class="callback-card">
      <h1>Task Planner</h1>
      
      <div id="loading">
        <div class="spinner"></div>
        <p class="message">Подтверждение email...</p>
      </div>
      
      <div id="success" style="display: none;">
        <svg class="success-icon show" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" stroke="#10b981"></circle>
          <path d="M9 12l2 2 4-4" stroke="#10b981"></path>
        </svg>
        <h2 style="color: var(--success);">Email подтвержден!</h2>
        <p class="message">Перенаправление на страницу входа...</p>
      </div>
      
      <div id="error" style="display: none;">
        <svg class="error-icon show" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="15" y1="9" x2="9" y2="15"></line>
          <line x1="9" y1="9" x2="15" y2="15"></line>
        </svg>
        <h2 style="color: var(--danger);">Ошибка</h2>
        <p class="message" id="errorMessage"></p>
        <a href="login.html" class="btn btn-primary" style="margin-top: 1rem; display: inline-block;">Перейти к входу</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://ggniagmcvpgoljcvlena.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_l0rUMPpOm6G6FWb6A_YaSg_gI1Wj_6D';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleAuthCallback() {
      try {
        // Get hash parameters from URL
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = hashParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token');
        const type = hashParams.get('type');

        if (!accessToken) {
          throw new Error('Токен не найден в URL');
        }

        // Set session with the tokens
        const { data, error } = await supabase.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken
        });

        if (error) throw error;

        // Show success
        document.getElementById('loading').style.display = 'none';
        document.getElementById('success').style.display = 'block';

        // Redirect to main app after 2 seconds
        setTimeout(() => {
          if (type === 'signup') {
            window.location.href = 'login.html';
          } else {
            window.location.href = 'index.html';
          }
        }, 2000);

      } catch (error) {
        console.error('Auth callback error:', error);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('errorMessage').textContent = error.message || 'Не удалось подтвердить email';
      }
    }

    // Run on page load
    handleAuthCallback();
  </script>
</body>
</html>
