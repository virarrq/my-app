<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Task Planner</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">T</div>
        <h1 class="auth-title">Task Planner</h1>
        <p class="auth-subtitle">Create your account to get started</p>
      </div>

      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-input-wrapper">
            <input type="password" id="password" class="form-input" placeholder="Enter your password" required minlength="6">
            <button type="button" class="toggle-password" onclick="togglePassword('password')">
              <img src="icons/eye.svg" alt="Show password" id="password-eye">
            </button>
          </div>
          <p class="form-hint">Minimum 6 characters</p>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <div class="password-input-wrapper">
            <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm your password" required minlength="6">
            <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
              <img src="icons/eye.svg" alt="Show password" id="confirmPassword-eye">
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary">
          Create Account
        </button>
      </form>

      <p class="auth-link">
        Already have an account? <a href="login.html">Login</a>
      </p>

      <div id="errorMessage" class="error-message"></div>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
